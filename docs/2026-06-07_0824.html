<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atleti News - 2026-06-07_0824</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #CE3524 0%, #8B0000 100%);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .header .date {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .source-section {
            margin-bottom: 2.5rem;
        }
        .source-title {
            font-size: 1.4rem;
            color: #CE3524;
            border-bottom: 3px solid #CE3524;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .news-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .news-card a {
            text-decoration: none;
            color: inherit;
        }
        .news-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .news-card .content {
            padding: 1rem;
        }
        .news-card h3 {
            font-size: 1rem;
            line-height: 1.4;
            color: #222;
            margin-bottom: 0.5rem;
        }
        .news-card .source-badge {
            display: inline-block;
            background: #CE3524;
            color: white;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }
        .no-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #CE3524 0%, #8B0000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
        .footer {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
        .error-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 1rem;
            color: #856404;
        }
        @media (max-width: 640px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
